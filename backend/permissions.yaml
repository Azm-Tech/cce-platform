# CCE — Permission matrix
# Single source of truth for all authorization permissions. Generated into
# `CCE.Domain.Permissions` and `CCE.Domain.RolePermissionMap` by:
#   backend/src/CCE.Domain.SourceGenerators/PermissionsGenerator.cs
#
# Schema:
#   groups:
#     <Group>:
#       <SubGroupOrAction>:
#         description: <human-readable description>
#         roles: [<Role1>, <Role2>, ...]
#
# Naming rules:
#   - PascalCase segments only.
#   - Verbs: Read / Create / Update / Delete / Approve / Reject / List / Search / Edit / Manage
#     / Restore / Run / Submit / Publish / View / Assign / Moderate / Follow / Rate / Reply.
#   - Stable: never rename — deprecate old + add new instead.
#
# Known roles (defined in PermissionsGenerator.KnownRoles):
#   cce-super-admin, cce-admin, cce-content-manager, cce-state-representative,
#   cce-reviewer, cce-expert, cce-user, Anonymous
#   These match the appRoles[].value entries in
#   infra/entra/app-registration-manifest.json (Sub-11 Phase 02).
#   Sub-11 Phase 03 mapping from legacy Keycloak names:
#     SuperAdmin           → cce-super-admin
#     Admin                → cce-admin
#     ContentManager       → cce-content-manager
#     StateRepresentative  → cce-state-representative
#     CommunityExpert      → cce-expert
#     RegisteredUser       → cce-user
#     (new in Sub-11)      → cce-reviewer (review queue + read-only on content)

groups:
  System:
    Health:
      Read:
        description: Read system health probe
        roles: [cce-super-admin, cce-admin]
  Cache:
    Manage:
      description: View and invalidate server-side output caches
      roles: [cce-super-admin, cce-admin]
  User:
    Read:
      description: Read user profiles
      roles: [cce-super-admin, cce-admin, cce-reviewer]
    Create:
      description: Create user accounts (admin path)
      roles: [cce-super-admin, cce-admin]
    Update:
      description: Update user profile fields (admin path)
      roles: [cce-super-admin, cce-admin]
    Delete:
      description: Soft-delete a user
      roles: [cce-super-admin, cce-admin]
    Restore:
      description: Undelete a previously soft-deleted user
      roles: [cce-super-admin, cce-admin]
  Role:
    Assign:
      description: Assign a role to a user
      roles: [cce-super-admin, cce-admin]
  Resource:
    Center:
      Upload:
        description: Upload a center-managed resource
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Update:
        description: Edit a center-managed resource
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Delete:
        description: Soft-delete a center resource
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      View:
        description: View resource center categories
        roles: [cce-super-admin, cce-admin, cce-content-manager, cce-state-representative, cce-reviewer]
    Country:
      Approve:
        description: Approve a country resource request
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Reject:
        description: Reject a country resource request
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Submit:
        description: Submit a country resource for approval
        roles: [cce-state-representative]
  News:
    Publish:
      description: Publish news articles
      roles: [cce-super-admin, cce-admin, cce-content-manager]
    Update:
      description: Edit news article
      roles: [cce-super-admin, cce-admin, cce-content-manager]
    Delete:
      description: Soft-delete news article
      roles: [cce-super-admin, cce-admin, cce-content-manager]
  Event:
    Manage:
      description: Create/update/delete events
      roles: [cce-super-admin, cce-admin, cce-content-manager]
  Page:
    Edit:
      description: Edit static pages (about, terms, privacy)
      roles: [cce-super-admin, cce-admin, cce-content-manager]
    PolicyEdit:
      description: Edit policies & terms settings (restricted)
      roles: [cce-super-admin]
  Country:
    Profile:
      Update:
        description: Edit country profile content
        roles: [cce-super-admin, cce-admin, cce-state-representative]
    Kapsarc:
      Refresh:
        description: Refresh a country's KAPSARC Circular Carbon Economy snapshot
        roles: [cce-super-admin, cce-admin]
  Content:
    Country:
      Submit:
        description: Submit a country-scoped resource/news/event for approval
        roles: [cce-state-representative, cce-admin, cce-super-admin]
      View:
        description: View own country content requests
        roles: [cce-state-representative, cce-admin, cce-super-admin]
  Community:
    Post:
      Create:
        description: Create a community post
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
      Reply:
        description: Reply to a community post
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
      Vote:
        description: Up/down vote a community post or reply
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
      Moderate:
        description: Soft-delete or restore a community post (moderation)
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Follow:
        description: Follow posts/topics/users
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
    Community:
      Create:
        description: Create a community
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Update:
        description: Update community settings
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Delete:
        description: Deactivate a community
        roles: [cce-super-admin, cce-admin]
      Moderate:
        description: Moderate community members and join requests
        roles: [cce-super-admin, cce-admin, cce-content-manager]
      Join:
        description: Join, leave, or follow a community
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
    Poll:
      Create:
        description: Create a poll post
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
      Vote:
        description: Vote on a poll
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
    Expert:
      RegisterRequest:
        description: Submit expert registration request
        roles: [cce-user]
      ApproveRequest:
        description: Approve or reject an expert registration request
        roles: [cce-super-admin, cce-admin, cce-content-manager, cce-reviewer]
  KnowledgeMap:
    View:
      description: View knowledge maps
      roles: [Anonymous, cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-reviewer, cce-admin, cce-super-admin]
    Manage:
      description: Create/update/delete knowledge maps
      roles: [cce-super-admin, cce-admin, cce-content-manager]
  InteractiveCity:
    Run:
      description: Run an Interactive City simulation
      roles: [Anonymous, cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
    SaveScenario:
      description: Save a scenario to user profile
      roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-admin, cce-super-admin]
  Survey:
    Submit:
      description: Submit a service rating
      roles: [Anonymous, cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-reviewer, cce-admin, cce-super-admin]
    ReadAll:
      description: Read all survey responses
      roles: [cce-super-admin, cce-admin]
  Notification:
    TemplateManage:
      description: Manage notification templates
      roles: [cce-super-admin, cce-admin]
    LogView:
      description: View notification logs and retry failed deliveries
      roles: [cce-super-admin, cce-admin]
    Send:
      description: Send manual/admin notifications
      roles: [cce-super-admin, cce-admin]
    DeviceToken:
      Register:
        description: Register a device token for push notifications
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-reviewer, cce-admin, cce-super-admin]
      Delete:
        description: Unregister/unlink a device token
        roles: [cce-user, cce-expert, cce-content-manager, cce-state-representative, cce-reviewer, cce-admin, cce-super-admin]
  Permission:
    Read:
      description: List and view available permissions
      roles: [cce-super-admin, cce-admin]
    Manage:
      description: Create/update/delete permissions
      roles: [cce-super-admin, cce-admin]
  Audit:
    Read:
      description: Query the audit-event log
      roles: [cce-super-admin, cce-admin]
  Report:
    UserRegistrations:
      description: Generate user-registration report
      roles: [cce-super-admin, cce-admin]
    ExpertList:
      description: Generate community-experts report
      roles: [cce-super-admin, cce-admin]
    SatisfactionSurvey:
      description: Generate satisfaction-survey report
      roles: [cce-super-admin, cce-admin]
    CommunityPosts:
      description: Generate community-posts report
      roles: [cce-super-admin, cce-admin]
    News:
      description: Generate news report
      roles: [cce-super-admin, cce-admin]
    Events:
      description: Generate events report
      roles: [cce-super-admin, cce-admin]
    Resources:
      description: Generate resources report
      roles: [cce-super-admin, cce-admin]
    CountryProfiles:
      description: Generate country profiles report
      roles: [cce-super-admin, cce-admin]
    UserPreferences:
      description: Generate user-preference report
      roles: [cce-super-admin, cce-admin]
    Experts:
      description: Generate expert registration report
      roles: [cce-super-admin, cce-admin]
  InteractiveMap:
    Manage:
      description: Create/update/delete interactive maps
      roles: [cce-super-admin, cce-admin, cce-content-manager]
  Lookup:
    Manage:
      description: Manage lookup tables (nationalities, country phone codes)
      roles: [cce-super-admin]
  CommunityLaws:
    Manage:
      description: Manage community law sections (create/update/delete/reorder)
      roles: [cce-super-admin, cce-admin, cce-content-manager]
