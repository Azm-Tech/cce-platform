<h2 mat-dialog-title>{{ 'interactiveCity.totals.save' | transloco }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>{{ 'interactiveCity.builder.name' | transloco }}</mat-label>
    <input
      matInput
      type="text"
      [formControl]="nameControl"
      [placeholder]="'interactiveCity.builder.namePlaceholder' | transloco"
      maxlength="200"
      (keydown.enter)="submit()"
    />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">
    {{ 'interactiveCity.saved.confirmCancel' | transloco }}
  </button>
  <button
    type="button"
    mat-flat-button
    color="primary"
    [disabled]="nameControl.invalid"
    (click)="submit()"
  >
    {{ 'interactiveCity.totals.save' | transloco }}
  </button>
</mat-dialog-actions>
