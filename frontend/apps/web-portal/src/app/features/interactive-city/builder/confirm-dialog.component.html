<h2 mat-dialog-title>{{ data.titleKey | translate }}</h2>

<mat-dialog-content>
  <p>{{ data.bodyKey | translate: data.bodyParams }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">
    {{ data.cancelKey | translate }}
  </button>
  <button
    type="button"
    mat-flat-button
    [color]="data.dangerous ? 'warn' : 'primary'"
    (click)="confirm()"
  >
    {{ data.confirmKey | translate }}
  </button>
</mat-dialog-actions>
