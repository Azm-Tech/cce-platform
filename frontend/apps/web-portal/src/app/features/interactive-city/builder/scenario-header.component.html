<form [formGroup]="form" class="cce-scenario-header" autocomplete="off">
  <mat-form-field appearance="outline" class="cce-scenario-header__name">
    <mat-label>{{ 'interactiveCity.builder.name' | transloco }}</mat-label>
    <input
      matInput
      type="text"
      formControlName="name"
      [placeholder]="'interactiveCity.builder.namePlaceholder' | transloco"
      maxlength="200"
    />
  </mat-form-field>

  <mat-form-field appearance="outline" class="cce-scenario-header__city">
    <mat-label>{{ 'interactiveCity.builder.cityType' | transloco }}</mat-label>
    <mat-select formControlName="cityType">
      @for (c of cityTypes; track c) {
        <mat-option [value]="c">
          {{ 'interactiveCity.cityType.' + c | transloco }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="cce-scenario-header__year">
    <mat-label>{{ 'interactiveCity.builder.targetYear' | transloco }}</mat-label>
    <input
      matInput
      type="number"
      formControlName="targetYear"
      [min]="yearBounds.min"
      [max]="yearBounds.max"
      step="1"
    />
  </mat-form-field>
</form>
