<section class="cce-scenario-builder">
  <cce-workbench-hero
    [eyebrow]="'interactiveCity.builder.eyebrow' | translate"
    [title]="'interactiveCity.builder.title' | translate"
    [subtitle]="'interactiveCity.builder.subtitle' | translate"
    [steps]="heroSteps()"
  />

  @if (store.catalogLoading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (store.catalogError()) {
    <div class="cce-scenario-builder__error" role="alert">
      <span>{{ 'interactiveCity.errors.loadCatalog' | translate }}</span>
      <button mat-button type="button" (click)="retryCatalog()">
        {{ 'interactiveCity.errors.retry' | translate }}
      </button>
    </div>
  }

  <cce-scenario-header />

  <!-- F009: governorate-level environmental factor inputs that drive
       the city baseline carbon footprint. -->
  <cce-environmental-factors />

  <div class="cce-scenario-builder__layout">
    <div class="cce-scenario-builder__catalog">
      <cce-technology-catalog />
    </div>
    <div class="cce-scenario-builder__selected">
      <cce-selected-list />
    </div>
  </div>

  <cce-totals-bar />

  <cce-saved-scenarios-drawer />
</section>
