<section class="cce-notifications-drawer" role="region" [attr.aria-label]="'notifications.title' | transloco">
  <header class="cce-notifications-drawer__header">
    <h2 class="cce-notifications-drawer__title">{{ 'notifications.title' | transloco }}</h2>
    @if (hasUnread()) {
      <button
        type="button"
        mat-stroked-button
        class="cce-notifications-drawer__mark-all"
        (click)="onMarkAllRead()"
      >
        {{ 'notifications.markAllRead' | transloco }}
      </button>
    }
  </header>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }

  @if (errorKind(); as kind) {
    <div class="cce-notifications-drawer__error" role="alert">
      <span>{{ ('errors.' + kind) | transloco }}</span>
      <button mat-button type="button" (click)="retry()">
        {{ 'errors.retry' | transloco }}
      </button>
    </div>
  }

  @if (empty()) {
    <p class="cce-notifications-drawer__empty">
      {{ 'notifications.empty' | transloco }}
    </p>
  }

  <div class="cce-notifications-drawer__list" role="list">
    @for (n of rows(); track n.id) {
      <cce-notification-flex flex-wrap -mx-3
        [notification]="n"
        [locale]="locale()"
        (markRead)="onMarkRead($event)"
      />
    }
  </div>

  @if (total() > pageSize()) {
    <mat-paginator
      [length]="total()"
      [pageIndex]="page() - 1"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
    />
  }
</section>
