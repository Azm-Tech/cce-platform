<div class="cce-search-filters">
  <mat-form-field appearance="outline" class="cce-search-filters__input">
    <mat-icon matPrefix aria-hidden="true">search</mat-icon>
    <mat-label>{{ 'knowledgeMaps.search.placeholder' | transloco }}</mat-label>
    <input
      matInput
      type="search"
      [ngModel]="inputValue()"
      (ngModelChange)="onInput($event)"
    />
  </mat-form-field>

  <div
    class="cce-search-filters__chips"
    role="group"
    [attr.aria-label]="'knowledgeMaps.filter.title' | transloco"
  >
    <span class="cce-search-filters__label">
      {{ 'knowledgeMaps.filter.title' | transloco }}:
    </span>
    @for (level of nodeLevels(); track level) {
      <button
        type="button"
        class="cce-search-filters__chip"
        [class.cce-search-filters__chip--active]="isActive(level)"
        [attr.aria-pressed]="isActive(level)"
        (click)="toggleFilter(level)"
      >
        {{ ('knowledgeMaps.detail.level.' + level) | transloco }}
      </button>
    }
  </div>
</div>
