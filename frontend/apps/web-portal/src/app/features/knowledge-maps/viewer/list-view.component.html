<div class="cce-list-view-wrap" [attr.aria-label]="'knowledgeMaps.viewMode.list' | transloco">
  <!-- ─── Sort toolbar ─────────────────────────────────────── -->
  <div class="cce-list-view__toolbar" role="group" [attr.aria-label]="'knowledgeMaps.list.sortLabel' | transloco">
    <span class="cce-list-view__toolbar-label">
      <mat-icon aria-hidden="true">sort</mat-icon>
      {{ 'knowledgeMaps.list.sortLabel' | transloco }}
    </span>
    <div class="cce-list-view__sort">
      <button
        type="button"
        class="cce-list-view__sort-btn"
        [class.cce-list-view__sort-btn--active]="sortOrder() === 'default'"
        [attr.aria-pressed]="sortOrder() === 'default'"
        (click)="setSort('default')"
      >
        {{ 'knowledgeMaps.list.sortDefault' | transloco }}
      </button>
      <button
        type="button"
        class="cce-list-view__sort-btn"
        [class.cce-list-view__sort-btn--active]="sortOrder() === 'alpha'"
        [attr.aria-pressed]="sortOrder() === 'alpha'"
        (click)="setSort('alpha')"
      >
        {{ 'knowledgeMaps.list.sortAlpha' | transloco }}
      </button>
    </div>
  </div>

  <nav class="cce-list-view">
    @for (group of grouped(); track group.level) {
      <section
        class="cce-list-view__section"
        [class.cce-list-view__section--collapsed]="isCollapsed(group.level)"
        [attr.data-level]="group.level"
      >
        <button
          type="button"
          class="cce-list-view__section-header"
          [attr.aria-expanded]="!isCollapsed(group.level)"
          [attr.aria-label]="(isCollapsed(group.level)
              ? 'knowledgeMaps.list.expandSection'
              : 'knowledgeMaps.list.collapseSection') | transloco"
          (click)="toggleCollapsed(group.level)"
        >
          <span class="cce-list-view__pip" [attr.data-level]="group.level" aria-hidden="true"></span>
          <h2 class="cce-list-view__section-title">
            {{ ('knowledgeMaps.detail.level.' + group.level) | transloco }}
          </h2>
          <span class="cce-list-view__count">{{ group.nodes.length }}</span>
          <mat-icon class="cce-list-view__chevron" aria-hidden="true">
            {{ isCollapsed(group.level) ? 'expand_more' : 'expand_less' }}
          </mat-icon>
        </button>

        @if (!isCollapsed(group.level)) {
          @if (group.nodes.length === 0) {
            <p class="cce-list-view__empty">
              {{ 'knowledgeMaps.list.noneOfType' | transloco }}
            </p>
          } @else {
            <ul class="cce-list-view__list">
              @for (n of group.nodes; track n.id) {
                <li>
                  <button
                    type="button"
                    class="cce-list-view__node"
                    [class.cce-list-view__node--selected]="isSelected(n)"
                    [class.cce-list-view__node--dimmed]="isDimmed(n)"
                    [attr.aria-current]="isSelected(n) ? 'true' : null"
                    (click)="onSelect(n)"
                  >
                    <span class="cce-list-view__name">{{ nameOf(n) }}</span>

                    @if (childCountOf(n) > 0) {
                      <span class="cce-list-view__edge-count" aria-hidden="true">
                        {{ childCountOf(n) }}
                      </span>
                    }
                  </button>
                </li>
              }
            </ul>
          }
        }
      </section>
    }
  </nav>
</div>
