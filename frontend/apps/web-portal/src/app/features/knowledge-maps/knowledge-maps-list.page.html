<section class="cce-km-list">
  <h1 class="cce-km-list__title">{{ 'knowledgeMaps.title' | translate }}</h1>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }

  @if (errorKind(); as kind) {
    <div class="cce-km-list__error" role="alert">
      <span>{{ ('errors.' + kind) | translate }}</span>
      <button mat-button type="button" (click)="retry()">
        {{ 'errors.retry' | translate }}
      </button>
    </div>
  }

  @if (empty()) {
    <p class="cce-km-list__empty">{{ 'knowledgeMaps.empty' | translate }}</p>
  }

  <div class="cce-km-list__grid">
    @for (m of rows(); track m.id) {
      <a
        class="cce-km-list__card-link"
        [routerLink]="['/knowledge-maps', m.id]"
        [attr.aria-label]="nameOf(m)"
      >
        <mat-card class="cce-km-list__card">
          <mat-card-header>
            <mat-icon mat-card-avatar aria-hidden="true">account_tree</mat-icon>
            <mat-card-title>{{ nameOf(m) }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ descriptionOf(m) }}</p>
          </mat-card-content>
        </mat-card>
      </a>
    }
  </div>
</section>
