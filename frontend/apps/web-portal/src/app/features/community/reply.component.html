<article
  class="cce-reply"
  [class.cce-reply--accepted]="isAccepted()"
>
  <!-- Avatar — inline-start (right in RTL), next to author name -->
  <span class="cce-reply__avatar" aria-hidden="true">{{ avatarInitial() }}</span>

  <!-- Body — inline-end side (left in RTL) -->
  <div class="cce-reply__body">

    @if (isAccepted()) {
      <span class="cce-reply__accepted-badge">
        <mat-icon svgIcon="badge-check" aria-hidden="true"></mat-icon>
        {{ 'community.detail.resolvedTag' | transloco }}
      </span>
    }

    <!-- Meta: author + expert badge + timestamp -->
    <div class="cce-reply__meta">
      <div class="cce-reply__author-row">
        <span class="cce-reply__author-name">{{ displayName() }}</span>
        @if (reply().isByExpert) {
          <mat-icon
            class="cce-reply__expert-icon"
            svgIcon="badge-check"
            aria-hidden="true"
          ></mat-icon>
        }
      </div>
      <time
        class="cce-reply__time"
        [attr.datetime]="reply().createdOn"
        [title]="reply().createdOn | date:'medium'"
      >{{ timeAgo(reply().createdOn) }}</time>
    </div>

    <!-- Content -->
    <p class="cce-reply__content" dir="auto">{{ reply().content }}</p>

    <!-- Actions: upvote widget + reply button + mark-answer -->
    <div class="cce-reply__actions">
      <div class="cce-reply__vote" dir="ltr">
        <span class="cce-reply__vote-score">{{ voteScore() }}</span>
        <button
          type="button"
          class="cce-reply__vote-btn"
          [class.cce-reply__vote-btn--active]="myVote() === 1"
          [attr.aria-pressed]="myVote() === 1"
          [attr.aria-label]="'community.detail.actionLike' | transloco"
          [disabled]="voting()"
          (click)="onVote()"
        >
          <mat-icon svgIcon="arrow-big-up" aria-hidden="true"></mat-icon>
        </button>
      </div>

      @if (markableForPostId(); as postId) {
        <cce-mark-answer-button
          [postId]="postId"
          [replyId]="reply().id"
          (marked)="answerMarked.emit()"
        />
      }
    </div>

  </div>
</article>
