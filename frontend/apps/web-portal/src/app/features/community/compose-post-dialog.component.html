<!-- ── Header ──────────────────────────────────────────────────────────── -->
<div class="cpd__header">
  <h2 class="cpd__title">{{ 'community.compose.title' | transloco }}</h2>
  <button type="button" class="cpd__close" (click)="cancel()">
    <mat-icon svgIcon="x" aria-hidden="true"></mat-icon>
  </button>
</div>

<!-- ── Body ───────────────────────────────────────────────────────────── -->
<mat-dialog-content class="cpd__body">
  <cce-compose-post-form
    [topics]="data.topics"
    [preselectedTopicId]="data.preselectedTopicId ?? null"
    (submitted)="onFormSubmitted($event)"
  />
</mat-dialog-content>

<!-- ── Footer ────────────────────────────────────────────────────────── -->
<mat-dialog-actions class="cpd__footer">
  <button
    type="button"
    class="cpd__btn cpd__btn--cancel"
    [disabled]="formRef().submitting()"
    (click)="cancel()"
  >
    {{ 'account.profile.cancelButton' | transloco }}
  </button>
  <button
    type="button"
    class="cpd__btn cpd__btn--submit"
    [disabled]="!formRef().canSubmit() || formRef().submitting()"
    (click)="formRef().triggerSubmit()"
  >
    @if (formRef().submitting()) {
      <mat-icon svgIcon="refresh-ccw" class="cpd__spin" aria-hidden="true"></mat-icon>
    }
    {{ 'community.compose.submit' | transloco }}
  </button>
</mat-dialog-actions>
