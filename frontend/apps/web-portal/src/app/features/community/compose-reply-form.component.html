<form
  class="cce-compose-reply"
  [formGroup]="form"
  (ngSubmit)="submit()"
>
  <!-- Header row -->
  <div class="cce-compose-reply__hd">
    <span class="cce-compose-reply__title">{{ 'community.detail.composeTitle' | transloco }}</span>
    <mat-icon svgIcon="message-square-plus" aria-hidden="true" class="cce-compose-reply__hd-icon"></mat-icon>
  </div>

  @if (errorKind()) {
    <div class="cce-compose-reply__error" role="alert">
      <mat-icon aria-hidden="true">error_outline</mat-icon>
      {{ ('errors.' + errorKind()) | transloco }}
    </div>
  }

  <!-- Plain textarea -->
  <div class="cce-compose-reply__textarea-wrap">
    <textarea
      class="cce-compose-reply__textarea"
      formControlName="content"
      [placeholder]="'community.replyPlaceholder' | transloco"
      maxlength="500"
      rows="5"
      dir="auto"
      (focus)="onFieldFocus($event)"
      (input)="onType()"
      (blur)="endTyping()"
    ></textarea>
    <span class="cce-compose-reply__char-count">{{ form.controls.content.value.length }} / 500</span>
  </div>

  <!-- Submit row -->
  <div class="cce-compose-reply__row">
    <button
      type="submit"
      class="cce-compose-reply__submit"
      [disabled]="form.invalid || submitting()"
    >
      @if (submitting()) {
        <mat-icon class="cce-compose-reply__spin" aria-hidden="true">refresh</mat-icon>
      }
      {{ 'community.sendReply' | transloco }}
    </button>
  </div>
</form>
