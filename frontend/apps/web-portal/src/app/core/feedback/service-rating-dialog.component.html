<h2 mat-dialog-title>{{ 'account.serviceRating.title' | translate }}</h2>

<mat-dialog-content>
  <div class="cce-service-rating__stars" role="radiogroup" [attr.aria-label]="'account.serviceRating.title' | translate">
    @for (s of stars; track s) {
      <button
        type="button"
        class="cce-service-rating__star"
        [class.cce-service-rating__star--filled]="isStarFilled(s)"
        role="radio"
        [attr.aria-checked]="rating() === s"
        [attr.aria-label]="starLabel(s)"
        (click)="setRating(s)"
      >
        <mat-icon>{{ isStarFilled(s) ? 'star' : 'star_border' }}</mat-icon>
      </button>
    }
  </div>

  <mat-form-field appearance="outline" class="cce-service-rating__comment">
    <mat-label>{{ 'account.serviceRating.commentLabel' | translate }}</mat-label>
    <textarea
      matInput
      [formControl]="comment"
      rows="3"
      maxlength="2000"
    ></textarea>
  </mat-form-field>

  @if (errorKind()) {
    <div class="cce-service-rating__error" role="alert">
      {{ ('errors.' + errorKind()) | translate }}
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()" [disabled]="submitting()">
    {{ 'account.profile.cancelButton' | translate }}
  </button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="!canSubmit()"
    (click)="submit()"
  >
    {{ 'account.serviceRating.submitButton' | translate }}
  </button>
</mat-dialog-actions>
