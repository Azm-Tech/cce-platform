@if (currentUser(); as user) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ user.firstName }} {{ user.lastName }}</mat-card-title>
      <mat-card-subtitle>{{ user.emailAddress }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p><strong>{{ 'account.profile.roles' | transloco }}</strong></p>
      <mat-chip-set>
        @for (role of user.roles; track role) {
          <mat-chip>{{ role }}</mat-chip>
        }
      </mat-chip-set>
    </mat-card-content>
  </mat-card>
}
