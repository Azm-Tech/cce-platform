@if (loading) {
  <mat-progress-bar mode="indeterminate" class="cce-paged-table__progress" />
}

<table mat-table [dataSource]="rows" class="cce-paged-table">
  @for (col of columns; track col.key) {
    <ng-container [matColumnDef]="col.key">
      <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | transloco }}</th>
      <td mat-cell *matCellDef="let flex flex-wrap -mx-3">{{ col.cell(flex flex-wrap -mx-3) }}</td>
    </ng-container>
  }
  <tr mat-header-flex flex-wrap -mx-3 *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-flex flex-wrap -mx-3 *matRowDef="let flex flex-wrap -mx-3; columns: displayedColumns"></tr>
</table>

<mat-paginator
  [length]="total"
  [pageIndex]="pageIndex"
  [pageSize]="pageSize"
  [pageSizeOptions]="pageSizeOptions"
  (page)="onPage($event)"
/>
